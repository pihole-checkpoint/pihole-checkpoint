name: Build and Push Image

on:
  push:
    branches: [main]
    tags: ["v*"]
  release:
    types: [published]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/pihole-checkpoint

jobs:
  tests:
    permissions:
      contents: read
    uses: ./.github/workflows/tests.yml
    secrets: inherit

  build-and-push:
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    runs-on: ubuntu-latest
    needs: tests
    steps:
      - uses: actions/checkout@v6

      - uses: ljmerza/misc-actions/actions/docker-build-push@v1
        id: build
        with:
          image-name: ${{ env.IMAGE_NAME }}
          registry-password: ${{ secrets.GITHUB_TOKEN }}
          tags: |
            type=ref,event=tag
            type=sha,prefix=sha-
            type=raw,value=main,enable={{is_default_branch}}
            type=raw,value=latest,enable=${{ github.event_name == 'release' }}

      - uses: ljmerza/misc-actions/actions/provenance-attest@v1
        with:
          image-name: ${{ env.IMAGE_NAME }}
          digest: ${{ steps.build.outputs.digest }}
